<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AI EMI Calculator — GoCredit</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:transparent;color:#1e293b;-webkit-font-smoothing:antialiased}
.widget{max-width:540px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e2e8f0;overflow:hidden;display:flex;flex-direction:column;height:100vh;max-height:700px}
.header{background:linear-gradient(135deg,#6C5CE7,#a855f7);padding:14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-icon{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px}
.header h2{color:#fff;font-size:15px;font-weight:700;flex:1}
.header p{color:rgba(255,255,255,.7);font-size:10px;margin-top:1px}
.mode-tabs{display:flex;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.mode-tab{flex:1;padding:10px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:none;background:#f8fafc;color:#64748b;transition:.2s}
.mode-tab:hover{background:#f1f5f9}
.mode-tab.active{background:#fff;color:#6C5CE7;box-shadow:inset 0 -2px 0 #6C5CE7}
.panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.panel.active{display:flex}

/* === SLIDER PANEL === */
.slider-body{padding:16px 20px;overflow-y:auto;flex:1}
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.tab{padding:5px 10px;border-radius:7px;font-size:10px;font-weight:600;border:none;cursor:pointer;transition:.2s;background:#f1f5f9;color:#64748b}
.tab:hover{background:#e2e8f0}
.tab.active{background:#6C5CE7;color:#fff}
.field{margin-bottom:14px}
.field-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.field-label{font-size:12px;font-weight:600;color:#475569}
.field-value{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:700;color:#1e293b}
input[type=range]{width:100%;height:6px;border-radius:3px;appearance:none;background:#e2e8f0;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:#6C5CE7;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:grab}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#6C5CE7;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:grab}
.range-labels{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:3px}
.results{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-radius:10px;padding:14px;margin-bottom:10px}
.results-inner{display:flex;align-items:center;gap:14px}
.pie{width:72px;height:72px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 4px rgba(0,0,0,.1)}
.pie-center{width:42px;height:42px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#475569}
.emi-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.emi-value{font-size:22px;font-weight:900;color:#1e293b;margin:1px 0 6px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sub-label{font-size:9px;color:#64748b}
.sub-value{font-size:12px;font-weight:700}
.sub-value.interest{color:#f59e0b}
.sub-value.total{color:#1e293b}
.legend{display:flex;align-items:center;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;color:#64748b}
.legend-dot{width:10px;height:10px;border-radius:2px}
.legend-dot.principal{background:#6C5CE7}
.legend-dot.int{background:#f59e0b}
.amort-btn{width:100%;padding:8px;background:none;border:none;color:#6C5CE7;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s}
.amort-btn:hover{color:#5b4bd4}
.amort-btn svg{transition:.2s}
.amort-btn.open svg{transform:rotate(180deg)}
.amort-table{max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px;margin-top:6px;display:none}
.amort-table.show{display:block}
.amort-table table{width:100%;font-size:10px;border-collapse:collapse}
.amort-table th{background:#f8fafc;padding:6px 8px;text-align:right;font-weight:600;color:#64748b;position:sticky;top:0}
.amort-table th:first-child{text-align:left}
.amort-table td{padding:5px 8px;text-align:right;border-top:1px solid #f1f5f9;color:#475569}
.amort-table td:first-child{text-align:left;font-weight:500;color:#1e293b}
.amort-table td.p{color:#6C5CE7;font-weight:500}
.amort-table td.i{color:#f59e0b}

/* === CHAT PANEL === */
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;background:#fafbfc}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.msg{margin-bottom:12px;display:flex}
.msg.user{justify-content:flex-end}
.msg-bubble{max-width:85%;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.5}
.msg.user .msg-bubble{background:#6C5CE7;color:#fff;border-bottom-right-radius:4px}
.msg.ai{gap:8px}
.msg.ai .msg-bubble{background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ai-avatar{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#6C5CE7,#a855f7);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.stat-card{border-radius:8px;padding:8px;border:1px solid #e2e8f0;background:#f8fafc}
.stat-card.accent{background:#6C5CE7/10;border-color:rgba(108,92,231,.2);background:rgba(108,92,231,.06)}
.stat-val{font-size:15px;font-weight:800;color:#1e293b}
.stat-card.accent .stat-val{color:#6C5CE7}
.stat-lbl{font-size:9px;color:#64748b;font-weight:500;margin-top:2px}
.hint-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px;font-size:11px;color:#15803d;margin-top:6px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.compare-card{border-radius:8px;padding:10px;border:1px solid #e2e8f0;background:#f8fafc}
.compare-card.winner{border-color:#86efac;background:#f0fdf4}
.compare-title{font-size:10px;font-weight:700;color:#475569;margin-bottom:4px}
.compare-emi{font-size:16px;font-weight:900;color:#1e293b}
.compare-sub{font-size:10px;color:#64748b;margin-top:2px}
.bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden;display:flex;margin:6px 0}
.bar-p{background:#6C5CE7;border-radius:4px 0 0 4px}
.bar-i{background:#f59e0b;border-radius:0 4px 4px 0}
.bar-legend{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8}
.quick-actions{padding:8px 16px;border-top:1px solid #f1f5f9;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:#fff}
.quick-actions::-webkit-scrollbar{height:0}
.qa-btn{font-size:10px;font-weight:500;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:5px 10px;white-space:nowrap;cursor:pointer;transition:.2s}
.qa-btn:hover{background:rgba(108,92,231,.05);color:#6C5CE7;border-color:rgba(108,92,231,.3)}
.chat-input{padding:10px 16px;border-top:1px solid #e2e8f0;background:#fff;display:flex;gap:8px;flex-shrink:0}
.chat-input input{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;color:#1e293b;outline:none}
.chat-input input:focus{border-color:#6C5CE7}
.chat-input input::placeholder{color:#94a3b8}
.chat-input button{background:#6C5CE7;color:#fff;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;transition:.2s;flex-shrink:0}
.chat-input button:hover{background:#5b4bd4}
.chat-input button:disabled{opacity:.4;cursor:default}
.pre{white-space:pre-line}

/* === FOOTER === */
.footer{background:#f8fafc;border-top:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.footer a{text-decoration:none;display:flex;align-items:center;gap:6px;font-size:10px;color:#64748b;transition:.2s}
.footer a:hover{color:#6C5CE7}
.footer a strong{color:#475569}
.footer .get-widget{font-size:9px;color:#6C5CE7;font-weight:600;text-decoration:none}
.footer .get-widget:hover{text-decoration:underline}
.footer img{width:16px;height:16px;border-radius:3px}
@media(max-width:480px){
  .widget{max-height:none;height:auto;min-height:100vh;border-radius:0;box-shadow:none;border:none}
  .header{padding:12px 16px}
  .header h2{font-size:14px}
  .slider-body{padding:14px 16px}
  .stat-grid{grid-template-columns:1fr 1fr;gap:5px}
  .stat-grid>:last-child{grid-column:span 2}
  .stat-val{font-size:13px}
  .compare-grid{grid-template-columns:1fr}
  .results-inner{flex-direction:column;align-items:stretch;gap:10px}
  .pie{width:60px;height:60px;margin:0 auto}
  .pie-center{width:36px;height:36px;font-size:8px}
  .emi-value{font-size:20px;text-align:center}
  .emi-label{text-align:center}
  .sub-grid{text-align:center}
  .legend{justify-content:center}
  .tabs{gap:4px}
  .tab{padding:4px 8px;font-size:9px}
  .msg-bubble{font-size:12px;padding:8px 12px}
  .qa-btn{font-size:9px;padding:4px 8px}
}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-icon">🤖</div>
    <div>
      <h2>AI EMI Calculator</h2>
      <p>Calculator + AI Chat · Powered by GoCredit</p>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('slider')">🧮 Calculator</button>
    <button class="mode-tab" onclick="switchMode('chat')">💬 AI Chat</button>
  </div>

  <!-- SLIDER PANEL -->
  <div class="panel active" id="sliderPanel">
    <div class="slider-body">
      <div class="tabs" id="tabs"></div>
      <div class="field">
        <div class="field-header"><span class="field-label">Loan Amount</span><span class="field-value" id="amtDisplay"></span></div>
        <input type="range" id="amtSlider" min="10000" max="2500000" step="5000" value="300000">
        <div class="range-labels"><span id="amtMin">₹10K</span><span id="amtMax">₹25L</span></div>
      </div>
      <div class="field">
        <div class="field-header"><span class="field-label">Interest Rate (p.a.)</span><span class="field-value" id="rateDisplay"></span></div>
        <input type="range" id="rateSlider" min="7" max="36" step="0.25" value="14">
        <div class="range-labels"><span id="rateMin">7%</span><span id="rateMax">36%</span></div>
      </div>
      <div class="field">
        <div class="field-header"><span class="field-label">Tenure</span><span class="field-value" id="tenureDisplay"></span></div>
        <input type="range" id="tenureSlider" min="3" max="84" step="3" value="36">
        <div class="range-labels"><span id="tenureMin">3m</span><span id="tenureMax">7y</span></div>
      </div>
      <div class="results">
        <div class="results-inner">
          <div class="pie" id="pie"><div class="pie-center">EMI</div></div>
          <div>
            <div class="emi-label">Monthly EMI</div>
            <div class="emi-value" id="emiValue"></div>
            <div class="sub-grid">
              <div><div class="sub-label">Total Interest</div><div class="sub-value interest" id="intValue"></div></div>
              <div><div class="sub-label">Total Payment</div><div class="sub-value total" id="totalValue"></div></div>
            </div>
          </div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot principal"></span><span id="pctPrincipal">Principal</span></div>
          <div class="legend-item"><span class="legend-dot int"></span><span id="pctInterest">Interest</span></div>
        </div>
      </div>
      <button class="amort-btn" id="amortBtn" onclick="toggleAmort()">View Amortization Schedule <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>
      <div class="amort-table" id="amortTable"><table><thead><tr><th>Month</th><th>EMI</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody id="amortBody"></tbody></table></div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="panel" id="chatPanel">
    <div class="chat-area" id="chatArea"></div>
    <div class="quick-actions" id="quickActions">
      <button class="qa-btn" onclick="chatSend('5 lakh loan at 14% for 3 years')">💰 Personal Loan</button>
      <button class="qa-btn" onclick="chatSend('30 lakh home loan at 8.5% for 20 years')">🏠 Home Loan</button>
      <button class="qa-btn" onclick="chatSend('FD 5 lakh at 7.25% for 3 years')">🏦 FD Returns</button>
      <button class="qa-btn" onclick="chatSend('SIP 5000 monthly at 12% for 10 years')">📈 SIP Growth</button>
      <button class="qa-btn" onclick="chatSend('How much loan on 40000 salary')">💼 Max Loan</button>
      <button class="qa-btn" onclick="chatSend('Compare 10.5% vs 14% on 5 lakh for 3 years')">⚖️ Compare</button>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Ask: 5 lakh loan at 12% for 3 years..." onkeydown="if(event.key==='Enter')chatSend()">
      <button onclick="chatSend()">→</button>
    </div>
  </div>

  <div class="footer">
    <a href="https://gocredit.money/emi-calculator-widget?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">
      <img src="https://gocredit.money/logo-ai.png" alt="GoCredit">
      <span>Powered by <strong>GoCredit</strong></span>
    </a>
    <a class="get-widget" href="https://gocredit.money/emi-calculator-widget?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">Get this free →</a>
  </div>
</div>

<script>
// ─── CALC ENGINE ───
const RATES={personal_loan:{min:10.49,typical:14,max:36,tenure:36},home_loan:{min:8.35,typical:9,max:12,tenure:240},car_loan:{min:8.5,typical:10,max:16,tenure:60},education_loan:{min:8,typical:10.5,max:15,tenure:84},lap:{min:8,typical:10,max:14,tenure:180},gold_loan:{min:7,typical:10,max:18,tenure:24},two_wheeler:{min:9,typical:14,max:24,tenure:36},fd:{min:5.5,typical:7.25,max:9,tenure_years:3},rd:{min:5.5,typical:7,max:8.5,tenure:36},sip:{min:10,typical:12,max:15,tenure_years:10}};

function calcEMI(P,R,N){const r=R/12/100;if(r===0)return Math.round(P/N);return Math.round(P*r*Math.pow(1+r,N)/(Math.pow(1+r,N)-1));}
function emiBd(P,R,N){const e=calcEMI(P,R,N),t=e*N,i=t-P;return{emi:e,principal:P,rate:R,tenure:N,totalInterest:i,totalPayment:t,intPct:Math.round(i/P*100)};}
function maxLoan(emiBudget,R,N){const r=R/12/100;if(r===0)return emiBudget*N;return Math.round(emiBudget*(Math.pow(1+r,N)-1)/(r*Math.pow(1+r,N)));}
function fdMat(P,R,Y){const m=Math.round(P*Math.pow(1+R/100/4,4*Y));return{principal:P,rate:R,years:Y,maturity:m,interest:m-P,effRate:Math.round(((m/P)**(1/Y)-1)*10000)/100};}
function rdMat(D,R,M){const r=R/100/4;let m=0;for(let i=0;i<M;i++)m+=D*Math.pow(1+r,(M-i)/3);m=Math.round(m);return{deposit:D,rate:R,months:M,totalDep:D*M,interest:m-D*M,maturity:m};}
function sipRet(S,R,Y){const r=R/12/100,n=Y*12,fv=Math.round(S*((Math.pow(1+r,n)-1)/r)*(1+r));return{sip:S,rate:R,years:Y,invested:S*n,returns:fv-S*n,value:fv,mult:Math.round(fv/(S*n)*100)/100};}
function afford(sal,R,N){const maxE=Math.round(sal*.5),ml=maxLoan(maxE,R,N);return{salary:sal,maxEMI:maxE,maxLoan:ml,rate:R,tenure:N};}
function compareLn(a,b){const ra=emiBd(a.P,a.R,a.N),rb=emiBd(b.P,b.R,b.N);return{a:{...ra,label:a.label},b:{...rb,label:b.label},cheaper:ra.totalInterest<rb.totalInterest?'a':rb.totalInterest<ra.totalInterest?'b':'equal',savings:Math.abs(ra.totalInterest-rb.totalInterest)};}
function prepay(P,R,N,amt,after){const emi=calcEMI(P,R,N),r=R/12/100;let bal=P;for(let m=1;m<=after;m++){bal-=(emi-bal*r);}const nb=Math.max(0,bal-amt);let nt=0;if(nb>0&&r>0)nt=Math.ceil(Math.log(emi/(emi-nb*r))/Math.log(1+r));const saved=emi*N-(emi*after+amt+emi*nt);return{emi,origTenure:N,prepay:amt,after,newTenure:after+nt,monthsSaved:Math.max(0,N-after-nt),interestSaved:Math.max(0,Math.round(saved))};}

const fmt=n=>{if(n>=1e7)return'\u20B9'+(n/1e7).toFixed(2)+' Cr';if(n>=1e5)return'\u20B9'+(n/1e5).toFixed(2)+' L';return'\u20B9'+Math.round(n).toLocaleString('en-IN')};
const fmtS=n=>{if(n>=1e7)return'\u20B9'+(n/1e7).toFixed(1)+'Cr';if(n>=1e5)return'\u20B9'+(n/1e5).toFixed(1)+'L';if(n>=1e3)return'\u20B9'+(n/1e3).toFixed(0)+'K';return'\u20B9'+Math.round(n)};
const fmtT=m=>{if(m>=12){const y=Math.floor(m/12),r=m%12;return y+'y'+(r?' '+r+'m':'');}return m+'m';};

// ─── NLP PARSER ───
function parseAmt(t){t=t.replace(/,/g,'').replace(/\u20B9/g,'').trim();let m;if(m=t.match(/([\.\d]+)\s*(?:cr|crore)/i))return parseFloat(m[1])*1e7;if(m=t.match(/([\.\d]+)\s*(?:l|lk|lakh|lakhs|lac)/i))return parseFloat(m[1])*1e5;if(m=t.match(/([\.\d]+)\s*(?:k|thousand)/i))return parseFloat(m[1])*1e3;if(m=t.match(/(\d+)/)){const n=parseInt(m[1]);return n<=100?n*1e5:n;}return null;}
function parseRate(t){let m;if(m=t.match(/([\.\d]+)\s*%/))return parseFloat(m[1]);if(m=t.match(/at\s+([\.\d]+)\s*(?:percent|%|p\.?a\.?)?/i))return parseFloat(m[1]);return null;}
function parseTenure(t){let m;if(m=t.match(/(\d+)\s*(?:month|months|mo)/i))return parseInt(m[1]);if(m=t.match(/(\d+)\s*(?:year|years|yr)/i))return parseInt(m[1])*12;return null;}
function parseSalary(t){let m;if(m=t.match(/(?:salary|income|earn|kamata)[\s:is]*(?:\u20B9)?\s*([\.\d,]+\s*(?:k|l|lakh|thousand)?)/i))return parseAmt(m[1]);if(m=t.match(/(?:on|with)\s*(?:\u20B9)?\s*([\.\d,]+\s*(?:k|l|lakh)?)\s*(?:salary|income)/i))return parseAmt(m[1]);if(m=t.match(/(?:\u20B9)?\s*([\.\d,]+\s*(?:k|l|lakh)?)\s*(?:salary|income)/i))return parseAmt(m[1]);return null;}
function detectType(t){t=t.toLowerCase();if(/home\s*loan|housing|ghar|property\s*loan/.test(t))return'home_loan';if(/car\s*loan|auto|vehicle|gaadi/.test(t))return'car_loan';if(/two\s*wheeler|bike|scooter/.test(t))return'two_wheeler';if(/education|study|student|padhai/.test(t))return'education_loan';if(/gold|sona|jewel/.test(t))return'gold_loan';if(/lap\b|loan\s*against\s*property/.test(t))return'lap';return'personal_loan';}

function parseQuery(text){
  const t=text.toLowerCase().trim();
  if(/^(hi|hello|hey|namaste|hii+)\s*!?$/.test(t))return{intent:'greeting'};
  if(/^(help|what can you|features)/.test(t))return{intent:'help'};
  // ── INFO / FAQ intents ──
  if(/what\s*is\s*emi|emi\s*kya|emi\s*meaning|explain\s*emi/i.test(t))return{intent:'info_emi'};
  if(/what\s*is\s*cibil|cibil\s*kya|credit\s*score\s*kya|cibil\s*meaning/i.test(t))return{intent:'info_cibil'};
  if(/(?:how\s*to\s*)?improv.*(?:cibil|credit\s*score)|cibil.*(?:badhao|improve|increase)/i.test(t))return{intent:'info_improve_cibil'};
  if(/what\s*is\s*personal\s*loan|personal\s*loan\s*kya/i.test(t))return{intent:'info_personal_loan'};
  if(/what\s*is\s*home\s*loan|home\s*loan\s*kya|housing\s*loan\s*kya/i.test(t))return{intent:'info_home_loan'};
  if(/what\s*(?:is|are)\s*(?:processing\s*fee|process.*charge)/i.test(t))return{intent:'info_processing_fee'};
  if(/what\s*is\s*foir|foir\s*kya|foir\s*meaning/i.test(t))return{intent:'info_foir'};
  if(/(?:document|docs|paper|kagaz).*(?:need|required|chahiye|loan)/i.test(t))return{intent:'info_documents'};
  if(/(?:fixed|floating).*rate|rate.*(?:fixed|floating)/i.test(t))return{intent:'info_fixed_vs_floating'};
  if(/(?:secured|unsecured).*loan|loan.*(?:secured|unsecured)/i.test(t))return{intent:'info_secured'};
  if(/(?:low|kam|kharab).*(?:cibil|score).*loan|loan.*(?:low|kam).*(?:cibil|score)/i.test(t))return{intent:'info_low_cibil_loan'};
  if(/(?:prepayment|foreclosure).*(?:penalty|charge)|(?:penalty|charge).*prepay/i.test(t))return{intent:'info_prepayment_penalty'};
  if(/(?:balance\s*transfer|bt\b).*loan|loan.*balance\s*transfer/i.test(t))return{intent:'info_balance_transfer'};
  if(/(?:apply|get|lena|chahiye|milega|loan\s*do|need\s*a?\s*loan|loan\s*lena|want\s*(?:a\s*)?loan|mujhe\s*loan)/i.test(t)&&!/how\s*much|kitna|compare|emi|calculat/i.test(t))return{intent:'info_get_loan'};
  if(/\b(fd|fixed\s*deposit)\b/i.test(t)){const p=parseAmt(t.replace(/fd|fixed\s*deposit/gi,''));const r=parseRate(t);const tn=parseTenure(t);return{intent:'fd',params:{P:p||100000,R:r||RATES.fd.typical,Y:tn?tn/12:RATES.fd.tenure_years}};}
  if(/\b(rd|recurring\s*deposit)\b/i.test(t)){const p=parseAmt(t.replace(/rd|recurring\s*deposit/gi,''));const r=parseRate(t);const tn=parseTenure(t);return{intent:'rd',params:{D:p||5000,R:r||RATES.rd.typical,M:tn||RATES.rd.tenure}};}
  if(/\b(sip|mutual\s*fund)\b/i.test(t)){const p=parseAmt(t.replace(/sip|mutual\s*fund/gi,''));const r=parseRate(t);const tn=parseTenure(t);return{intent:'sip',params:{S:p||5000,R:r||RATES.sip.typical,Y:tn?tn/12:RATES.sip.tenure_years}};}
  if(/\b(prepay|pre-pay|part\s*pay)\b/i.test(t)){const amts=[];let m;const re=/(?:\u20B9)?\s*([\.\d,]+\s*(?:k|l|lakh|cr|crore)?)/gi;while(m=re.exec(t)){const v=parseAmt(m[1]);if(v&&v>0)amts.push(v);}const r=parseRate(t);const tn=parseTenure(t);const lt=detectType(t);const d=RATES[lt];return{intent:'prepay',params:{P:amts[0]||500000,amt:amts[1]||(amts[0]?Math.round(amts[0]*.1):50000),R:r||d.typical,N:tn||d.tenure}};}
  if(/\b(compare|vs|versus|which.*better)\b/i.test(t)){const rates=[];let m;const re=/([\.\d]+)\s*%/g;while(m=re.exec(t))rates.push(parseFloat(m[1]));const tenures=[];const re2=/(\d+)\s*(?:year|yr|month)/gi;while(m=re2.exec(t)){const v=parseInt(m[1]);tenures.push(/year|yr/i.test(m[0])?v*12:v);}const p=parseAmt(t)||500000;const lt=detectType(t);const d=RATES[lt];if(rates.length>=2)return{intent:'compare',params:{a:{P:p,R:rates[0],N:tenures[0]||d.tenure,label:rates[0]+'%'},b:{P:p,R:rates[1],N:tenures[1]||tenures[0]||d.tenure,label:rates[1]+'%'}}};if(tenures.length>=2){const r=rates[0]||d.typical;return{intent:'compare',params:{a:{P:p,R:r,N:tenures[0],label:fmtT(tenures[0])},b:{P:p,R:r,N:tenures[1],label:fmtT(tenures[1])}}};}return{intent:'compare_help'};}
  if(/\b(afford|how\s*much.*loan|max.*loan|eligib|salary|income|kamata|kitna\s*mil)\b/i.test(t)){const sal=parseSalary(t)||parseAmt(t);const r=parseRate(t);const tn=parseTenure(t);const lt=detectType(t);const d=RATES[lt];if(sal&&sal<=1e6)return{intent:'afford',params:{sal,R:r||d.typical,N:tn||d.tenure,lt}};}
  const amount=parseAmt(t),rate=parseRate(t),tenure=parseTenure(t),lt=detectType(t),d=RATES[lt];
  if(amount||rate||tenure)return{intent:'emi',params:{P:amount||500000,R:rate||d.typical,N:tenure||d.tenure,lt}};
  return{intent:'unknown'};
}

    case'compare':{const r=compareLn(p.params.a,p.params.b);html='<div style="font-size:10px;font-weight:700;color:#d97706;text-transform:uppercase;letter-spacing:.5px">Loan Comparison</div><div class="compare-grid"><div class="compare-card'+(r.cheaper==='a'?' winner':'')+'"><div class="compare-title">'+r.a.label+(r.cheaper==='a'?' ✅':'')+'</div><div class="compare-emi">'+fmt(r.a.emi)+'<span style="font-size:10px;font-weight:400;color:#64748b">/mo</span></div><div class="compare-sub">Interest: '+fmt(r.a.totalInterest)+'</div></div><div class="compare-card'+(r.cheaper==='b'?' winner':'')+'"><div class="compare-title">'+r.b.label+(r.cheaper==='b'?' ✅':'')+'</div><div class="compare-emi">'+fmt(r.b.emi)+'<span style="font-size:10px;font-weight:400;color:#64748b">/mo</span></div><div class="compare-sub">Interest: '+fmt(r.b.totalInterest)+'</div></div></div>';if(r.savings>0)html+='<div class="hint-box">💰 '+(r.cheaper==='a'?r.a.label:r.b.label)+' saves '+fmt(r.savings)+' in total interest</div>';break;}

    case'compare_help':html='To compare, tell me two options:\n• <i>"Compare 10.5% vs 14% on 5 lakh for 3 years"</i>\n• <i>"Compare 3 year vs 5 year on 10 lakh at 12%"</i>';break;
    // ── INFO / FAQ responses ──
    case'info_emi':html='<b>EMI (Equated Monthly Installment)</b> is the fixed amount you pay every month to repay a loan. It includes both principal and interest.\n\n• EMI depends on 3 things: <b>loan amount</b>, <b>interest rate</b>, and <b>tenure</b>\n• Higher tenure = lower EMI but more total interest\n• India uses the <b>reducing balance</b> method — interest is charged on remaining principal, not original amount\n\nTry calculating: <i>"5 lakh at 12% for 3 years"</i>\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit</a> finds the lowest EMI across 55+ lenders for your profile</div>';break;
    case'info_cibil':html='<b>CIBIL Score</b> is a 3-digit number (300-900) that represents your credit history. Lenders use it to decide loan approval and interest rate.\n\n• <b>750+</b> — Excellent. Best rates, instant approval\n• <b>700-749</b> — Good. Most lenders approve\n• <b>650-699</b> — Fair. Higher rates, fewer options\n• <b>Below 650</b> — Poor. Limited options, high rates\n\nChecking your score does NOT reduce it (soft inquiry).\n\n<div class="hint-box">💡 Check your CIBIL score free on <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit</a> — get AI-powered improvement tips</div>';break;
    case'info_improve_cibil':html='<b>How to Improve CIBIL Score:</b>\n\n1. <b>Pay EMIs on time</b> — payment history is 35% of your score\n2. <b>Keep credit utilization below 30%</b> — don\'t max out credit cards\n3. <b>Don\'t apply to many lenders</b> — each hard inquiry drops your score\n4. <b>Maintain old credit accounts</b> — longer history = better score\n5. <b>Mix of credit types</b> — secured + unsecured helps\n6. <b>Check for errors</b> — dispute wrong entries on CIBIL website\n\nImprovement takes 1-6 months depending on the issue.\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit Credit Boost AI</a> analyzes your report and gives a personalized improvement plan</div>';break;
    case'info_personal_loan':html='<b>Personal Loan</b> is an unsecured loan (no collateral needed) for any purpose — medical, wedding, travel, debt consolidation, etc.\n\n• <b>Amount:</b> \u20B910,000 to \u20B950 lakhs\n• <b>Rate:</b> 10.49% to 36% p.a.\n• <b>Tenure:</b> 3 months to 7 years\n• <b>Documents:</b> PAN, Aadhaar, salary slips, bank statement\n• <b>Disbursal:</b> Minutes to 3 days depending on lender\n\nTry: <i>"5 lakh personal loan at 14% for 3 years"</i>\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit AI Loan Agent</a> scans 55+ lenders and finds the best personal loan for you in 60 seconds</div>';break;
    case'info_home_loan':html='<b>Home Loan</b> is a secured loan for buying/constructing a house or flat. The property is collateral.\n\n• <b>Amount:</b> \u20B95 lakhs to \u20B95+ crore\n• <b>Rate:</b> 8.35% to 14% p.a. (usually floating)\n• <b>Tenure:</b> Up to 30 years\n• <b>Down payment:</b> 10-20% of property value\n• <b>Tax benefit:</b> Section 80C (principal) + Section 24 (interest up to \u20B92L/year)\n\nTry: <i>"30 lakh home loan at 8.5% for 20 years"</i>';break;
    case'info_processing_fee':html='<b>Processing Fee</b> is a one-time charge by the lender for processing your loan application.\n\n• Usually <b>0.5% to 3%</b> of loan amount\n• Charged upfront — deducted from disbursement or paid separately\n• Some lenders offer <b>zero processing fee</b> during promotions\n• Non-refundable even if loan is rejected\n\n<b>Example:</b> On \u20B95 lakh loan at 2% fee = \u20B910,000 processing fee\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit</a> shows all fees upfront — compare the total cost, not just interest rate</div>';break;
    case'info_foir':html='<b>FOIR (Fixed Obligation to Income Ratio)</b> determines how much EMI you can afford.\n\n• <b>Formula:</b> Total monthly EMIs ÷ Monthly income\n• <b>Safe limit:</b> Below 50% (most lenders use this)\n• <b>Example:</b> Salary \u20B950,000 → Max total EMIs = \u20B925,000\n• Existing EMIs (car, credit card) reduce your available capacity\n\nTry: <i>"How much loan on 50000 salary"</i>';break;
    case'info_documents':html='<b>Documents for Personal Loan:</b>\n\n<b>Salaried:</b>\n• PAN Card\n• Aadhaar Card\n• Last 3 months salary slips\n• Last 6 months bank statement\n• Passport-size photo\n\n<b>Self-employed:</b>\n• PAN Card\n• Aadhaar Card\n• Last 2 years ITR\n• Business proof (GST/registration)\n• Last 6 months bank statement\n\nMany fintech lenders need only <b>PAN + Aadhaar</b> for instant digital verification.\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit</a> auto-fills your application — no repeated document uploads across lenders</div>';break;
    case'info_fixed_vs_floating':html='<b>Fixed vs Floating Interest Rate:</b>\n\n<b>Fixed Rate:</b>\n• Rate stays same throughout tenure\n• EMI never changes\n• Usually 1-2% higher than floating\n• Best when rates are expected to rise\n\n<b>Floating Rate:</b>\n• Linked to RBI repo rate — changes with market\n• EMI can go up or down\n• Usually starts lower than fixed\n• Most home loans in India are floating\n\n<b>Tip:</b> For short tenure loans (1-3 years), fixed is fine. For long tenure (10-30 years), floating usually wins.';break;
    case'info_secured':html='<b>Secured vs Unsecured Loans:</b>\n\n<b>Secured:</b> Backed by collateral (home, car, gold, FD)\n• Lower interest rates (7-14%)\n• Higher amounts available\n• Examples: Home loan, car loan, gold loan, LAP\n• Risk: Lender can seize asset on default\n\n<b>Unsecured:</b> No collateral needed\n• Higher interest rates (10.49-36%)\n• Based on creditworthiness (CIBIL, salary)\n• Examples: Personal loan, credit card\n• Faster disbursal — often same day';break;
    case'info_low_cibil_loan':html='<b>Loan with Low CIBIL Score:</b>\n\nYes, you can get a loan even with low CIBIL! Options:\n\n• <b>Fintech lenders:</b> Accept 550+ scores, some don\'t check CIBIL at all\n• <b>NBFCs:</b> More flexible than banks, consider overall profile\n• <b>Gold loan:</b> Secured against gold — CIBIL doesn\'t matter much\n• <b>Co-applicant:</b> Apply with someone who has better score\n\n<b>Expect:</b> Higher interest (18-36%) and smaller amounts initially.\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit AI</a> matches you with lenders that approve your exact CIBIL range — no wasted applications</div>';break;
    case'info_prepayment_penalty':html='<b>Prepayment / Foreclosure Charges:</b>\n\n• <b>Floating rate loans:</b> RBI banned prepayment penalty for individual borrowers (2012)\n• <b>Fixed rate loans:</b> Lenders may charge 2-4% of outstanding amount\n• <b>Personal loans:</b> Usually allow prepayment after 6-12 EMIs, some charge 2-5%\n• <b>Home loans:</b> No penalty on floating rate (RBI rule)\n\n<b>Tip:</b> Even with penalty, prepayment often saves more in interest than the penalty costs.\n\nTry: <i>"Prepay 1 lakh on 10 lakh loan at 12% for 5 years"</i>';break;
    case'info_balance_transfer':html='<b>Balance Transfer (BT):</b>\n\nTransfer your existing loan to a new lender at a lower interest rate.\n\n• <b>Savings:</b> Even 1-2% lower rate saves lakhs on home loans\n• <b>When to do it:</b> When rate difference is >1% and remaining tenure is long\n• <b>Costs:</b> Processing fee (0.5-1%) + legal charges\n• <b>CIBIL impact:</b> One hard inquiry — minimal impact\n\n<b>Example:</b> \u20B930L home loan, 20 years left. Moving from 9.5% to 8.5% saves ~\u20B93.7 lakhs!\n\n<div class="hint-box">💡 <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit</a> compares balance transfer offers from 55+ lenders</div>';break;
    case'info_get_loan':html='<b>Looking to get a loan?</b>\n\nI can help you calculate EMI, check affordability, and compare options right here! Try:\n\n• <i>"5 lakh loan at 14% for 3 years"</i> — calculate EMI\n• <i>"How much loan on 40000 salary"</i> — check affordability\n• <i>"Compare 10% vs 14% on 5 lakh"</i> — compare rates\n\n<div class="hint-box">💡 Ready to apply? <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:600">GoCredit AI Loan Agent</a> scans 55+ lenders and finds the best offer for your profile — in 60 seconds. <a href="https://gocredit.money" target="_blank" style="color:#15803d;font-weight:700">Try GoCredit Free →</a></div>';break;
